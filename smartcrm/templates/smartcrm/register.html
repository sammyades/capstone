{% extends "smartcrm/layout.html" %}

{% block body %}

    <div class="row g-0 vh-50 mt-n6 mx-n4">
        <div class="col-lg-4 d-none d-lg-flex bg-dark align-items-center justify-content-center text-white p-4">
            <div class="text-center">
                <h1 class="display-4 fw-bold">SMARTCRM</h1>
                <p class="lead opacity-75">Start managing your business relationships.</p>
            </div>
        </div>

        <div class="p-5 w-100 bg-white" style="max-width: 500px;">

            <h2>Register</h2>

            {% if message %}
                <div>{{ message }}</div>
            {% endif %}

            <form action="{% url 'register' %}" method="post">
                {% csrf_token %}
                <div class="form-group">
                    <input autofocus class="form-control" type="text" name="username" placeholder="Username">
                </div>
                <div class="form-group">
                    <input class="form-control" type="email" name="email" placeholder="Email Address">
                </div>
                <div class="form-group">
                    <input class="form-control" type="password" name="password" placeholder="Password">
                </div>
                <div class="form-group">
                    <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
                </div>
                <input class="btn btn-primary" type="submit" value="Register">
            </form>

            Already have an account? <a href="{% url 'login' %}">Log In here.</a>
        </div>
    </div>

    <style>
        /* Ensures the layout spans the full viewport by neutralizing default wrapper padding */
        .mt-n4 { margin-top: -1.5rem !important; }
        .mx-n4 { margin-left: -1.5rem !important; margin-right: -1.5rem !important; }
        .vh-100 { min-height: 100vh; }
    </style>
{% endblock %}
